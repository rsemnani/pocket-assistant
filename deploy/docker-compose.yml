# Pocket Assistant server stack (runs on @mini via Docker Compose).
# Secrets come from deploy/.env (git-ignored). Never commit real values.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pocket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in deploy/.env}
      POSTGRES_DB: ${POSTGRES_DB:-pocket}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pocket}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build:
      context: ../backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-prod}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-pocket}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pocket}
      REDIS_URL: redis://redis:6379/0
      MEDIA_ROOT: /data/media
      MEDIA_MAX_BYTES: ${MEDIA_MAX_BYTES:-53687091200}
      DEVICE_TOKEN_PEPPER: ${DEVICE_TOKEN_PEPPER:?set in deploy/.env}
      DEV_SESSION_PIN: ${DEV_SESSION_PIN:?set in deploy/.env}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_API_KEY: ${LLM_API_KEY:-}
      GITHUB_REPO_ALLOWLIST: ${GITHUB_REPO_ALLOWLIST:-}
      CALENDAR_ICS_FEED_URL: ${CALENDAR_ICS_FEED_URL:-}
    volumes:
      - ${MEDIA_HOST_PATH:-./_media}:/data/media
    ports:
      - "${API_PORT:-8000}:8000"

volumes:
  pgdata:
