version: 2
updates:
  # Backend Python dependencies (uv / pip ecosystem).
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      backend-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions workflow pins.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Docker base images.
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"

  # Android Gradle dependencies (active from Phase 2).
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
