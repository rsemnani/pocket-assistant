# Pre-commit hooks for Pocket Assistant.
# Install once:  pip install pre-commit && pre-commit install
# Run on all files:  pre-commit run --all-files
#
# These mirror the CI checks so problems are caught BEFORE a push.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-case-conflict

  # Secret scanning — blocks commits containing credentials.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Python lint + format (backend).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # Guard: never commit a real .env (only .env.example is allowed).
  - repo: local
    hooks:
      - id: forbid-env-files
        name: forbid committing .env files
        entry: "Do not commit .env files; only .env.example is allowed."
        language: fail
        files: '(^|/)\.env($|\.)(?!example)'
